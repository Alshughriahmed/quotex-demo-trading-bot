name: Basic checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python files
        run: python -m compileall bot tools

      - name: Run local safety check
        run: python tools/safety_check.py
