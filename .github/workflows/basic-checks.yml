name: Basic checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python-basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile Python files
        run: python -m compileall bot tools

      - name: Run strategy smoke test
        run: python tools/strategy_smoke_test.py

      - name: Run backtest smoke test
        run: python tools/backtest_smoke_test.py

      - name: Run backtest comparison smoke test
        run: python tools/compare_backtests_smoke_test.py

      - name: Run strategy sweep smoke test
        run: python tools/sweep_strategy_smoke_test.py

      - name: Run portfolio sweep smoke test
        run: python tools/sweep_portfolio_smoke_test.py

      - name: Run strategy lab smoke test
        run: python tools/strategy_lab_smoke_test.py

      - name: Run strategy acceptance gate smoke test
        run: python tools/strategy_acceptance_gate_smoke_test.py

      - name: Run local safety check
        run: python tools/safety_check.py
